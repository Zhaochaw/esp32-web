<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Controller - Smart Air</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 30px; background: #f4f4f4; }
        .container { background: white; max-width: 450px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #333; font-size: 24px; }
        
        .btn-group { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .btn { width: 48%; padding: 12px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold;}
        .on { background: #28a745; }
        .off { background: #dc3545; }
        
        .status-panel { background: #f8f9fa; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #ddd; text-align: left; font-size: 14px;}
        #webStatus { color: orange; margin-bottom: 5px; }
        #espStatus { color: gray; font-weight: bold; font-size: 16px;}
        
        .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .sensor-box { background: #e9ecef; padding: 15px 5px; border-radius: 8px; font-size: 13px; color: #555; text-align: center; }
        .sensor-value { display: block; font-weight: bold; font-size: 22px; margin-top: 5px; }
        
        #pmValue { color: #555; }
        #tempValue { color: #d35400; }
        #humValue { color: #007bff; }
        #mqValue { color: #27ae60; }
        
        .section-title { text-align: left; margin-bottom: 8px; font-weight: bold; color: #555; margin-top: 20px;}
        
        /* ปุ่ม CSV ทั้ง 2 ปุ่ม */
        .btn-csv { width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; background: #17a2b8; margin-top: 20px; transition: 0.3s;}
        .btn-csv:hover { background: #138496; }
        
        .btn-reset { width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; background: #6c757d; margin-top: 10px; transition: 0.3s;}
        .btn-reset:hover { background: #5a6268; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Smart Air Dashboard</h1>
        
        <div class="status-panel">
            <div id="webStatus">🌐 สถานะเว็บ: กำลังเชื่อมต่อ MQTT...</div>
            <div id="espStatus">🔌 บอร์ด ESP32: รอรับสถานะ... ⏳</div>
        </div>
        
        <div class="sensor-grid">
            <div class="sensor-box">
                ค่าฝุ่น PM (µg/m³)
                <span id="pmValue" class="sensor-value">--</span>
            </div>
            <div class="sensor-box">
                อุณหภูมิ (°C)
                <span id="tempValue" class="sensor-value">--</span>
            </div>
            <div class="sensor-box">
                ความชื้น (%)
                <span id="humValue" class="sensor-value">--</span>
            </div>
            <div class="sensor-box">
                คุณภาพอากาศ (MQ)
                <span id="mqValue" class="sensor-value">--</span>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #ddd;">

        <div class="section-title">เครื่องพ่นประจุไอออน (Ion)</div>
        <div class="btn-group">
            <button class="btn on" onclick="send('ONion')">เปิด Ion</button>
            <button class="btn off" onclick="send('OFFion')">ปิด Ion</button>
        </div>

        <div class="section-title">พัดลม (Fan)</div>
        <div class="btn-group">
            <button class="btn on" onclick="send('ONfan')">เปิด Fan (Manual)</button>
            <button class="btn off" onclick="send('OFFfan')">ปิด Fan (Manual)</button>
        </div>

        <button class="btn-csv" onclick="downloadCSV()">💾 ดาวน์โหลดข้อมูล (CSV)</button>
        <button class="btn-reset" onclick="resetCSV()">🗑️ ล้างข้อมูลใหม่ (Reset)</button>
        <div style="font-size: 13px; color: #555; margin-top: 8px; text-align: center; font-weight: bold;" id="recordCount">กำลังบันทึก... (0 แถว)</div>
    </div>

    <script>
        const topic_publish = "Ris/Pj/Cmd";    
        const topic_sub_stream = "Ris/Pj/Stream";
        const topic_sub_status = "Ris/Pj/Status";

        const client = new Paho.MQTT.Client("broker.hivemq.com", 8884, "webclient-" + Math.random());

        // ตัวแปรสำหรับเก็บข้อมูล CSV
        let csvData = ["Time,PM(µg/m3),Temperature(C),Humidity(%),MQ(ppm)"];
        let recordCounter = 0;

        client.onMessageArrived = function(message) {
            if(message.destinationName === topic_sub_status) {
                let espStatusDiv = document.getElementById("espStatus");
                if(message.payloadString === "Online") {
                    espStatusDiv.innerHTML = "🔌 บอร์ด ESP32: <b>ออนไลน์ 🟢</b>";
                    espStatusDiv.style.color = "green";
                } else if (message.payloadString === "Offline") {
                    espStatusDiv.innerHTML = "🔌 บอร์ด ESP32: <b>ออฟไลน์ 🔴</b>";
                    espStatusDiv.style.color = "red";
                }
            }
            else if(message.destinationName === topic_sub_stream) {
                try {
                    let data = JSON.parse(message.payloadString);
                    document.getElementById("pmValue").innerText = data.pm;
                    document.getElementById("tempValue").innerText = data.temp + "°";
                    document.getElementById("humValue").innerText = data.hum + "%"; 
                    document.getElementById("mqValue").innerText = data.mq + " ppm";

                    // ==========================================
                    // บันทึกข้อมูลลง CSV
                    // ==========================================
                    let now = new Date();
                    let timeString = now.toLocaleTimeString('th-TH'); 
                    let newRow = `${timeString},${data.pm},${data.temp},${data.hum},${data.mq}`;
                    
                    csvData.push(newRow); 
                    recordCounter++;
                    document.getElementById("recordCount").innerText = `กำลังบันทึก... (${recordCounter} แถว)`;

                } catch(e) {
                    console.log("Error parsing JSON:", e);
                }
            } 
        };

        client.connect({
            useSSL: true,  
            onSuccess: () => {
                let webStatusDiv = document.getElementById("webStatus");
                webStatusDiv.innerText = "🌐 สถานะเว็บ: เชื่อมต่อเซิร์ฟเวอร์แล้ว ✅";
                webStatusDiv.style.color = "green";
                
                client.subscribe(topic_sub_stream);
                client.subscribe(topic_sub_status);
            },
            onFailure: (err) => { 
                let webStatusDiv = document.getElementById("webStatus");
                webStatusDiv.innerText = "🌐 สถานะเว็บ: เชื่อมต่อล้มเหลว ❌";
                webStatusDiv.style.color = "red";
            }
        });

        function send(msg) {
            if(client.isConnected()){
                let message = new Paho.MQTT.Message(msg);
                message.destinationName = topic_publish;
                client.send(message);
            } else {
                alert("รอหน้าเว็บเชื่อมต่อเซิร์ฟเวอร์ก่อนนะครับ");
            }
        }

        // ==========================================
        // ฟังก์ชันดาวน์โหลด CSV
        // ==========================================
        function downloadCSV() {
            if(csvData.length <= 1) {
                alert("ยังไม่มีข้อมูลให้ดาวน์โหลดครับ รอสักครู่นะครับ");
                return;
            }
            
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF" + csvData.join("\n");
            let encodedUri = encodeURI(csvContent);
            let link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            
            let now = new Date();
            let fileName = "SmartAir_Data_" + now.getHours() + now.getMinutes() + ".csv";
            link.setAttribute("download", fileName);
            
            document.body.appendChild(link);
            link.click(); 
            document.body.removeChild(link);
        }

        // ==========================================
        // ฟังก์ชันล้างข้อมูล CSV (เพิ่มใหม่)
        // ==========================================
        function resetCSV() {
            // แจ้งเตือนก่อนลบ เผื่อกดผิด
            let confirmReset = confirm("คุณต้องการล้างข้อมูลที่บันทึกไว้ทั้งหมดใช่หรือไม่?\n(ถ้ายังไม่ได้โหลด ข้อมูลจะหายไปเลยนะครับ)");
            
            if(confirmReset) {
                // รีเซ็ตค่าตัวแปรให้กลับไปเป็นเหมือนตอนเปิดเว็บใหม่ๆ
                csvData = ["Time,PM(µg/m3),Temperature(C),Humidity(%),MQ(ppm)"];
                recordCounter = 0;
                document.getElementById("recordCount").innerText = "กำลังบันทึก... (0 แถว)";
            }
        }
    </script>
</body>
</html>
